<!doctype html>
<html class="no-js" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="x-ua-compatible" content="ie=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="author" content="Silvana Ramírez">
    <title>Cruise App</title>

    <link href='https://fonts.googleapis.com/css?family=Lato:400,700,300' rel='stylesheet' type='text/css'>

    <link rel="stylesheet" href="css/foundation.css" />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  
  <body>


  <div class="app">
    <header class="app__header">
      <h1 class="app__header__title">Cruise app test</h1>
    </header>
    <div class="app__title grid-block">
      <h2 class="app__title__title">Choose Your Sailings</h2> <p class="app__title__text">(Pick one for each box)</p>
    </div>
    <div class="app__options row">

      <div class="app__opt large-4 medium-12 small-12 columns">
        <div class="app__opt__value">
          <p class="vText">Starting at</p>
          <h3 class="vValue">$198</h3>
        </div> <!-- app value -->
        <div class="app__opt__img">
          <img src="img/ship-01.jpg" alt="Cruise picture">
        </div><!-- app img-->
        <div class="app__opt__desc">
          <p class="dText">Cruise Line Name - Cruise Ship Name</p>
          <h2 class="dTitle">Cruise Sailing Title</h2>
          <div class="app__opt__select">
            <input type="radio">
            <span>Name</span>
            <span>$300</span>
          </div>
        </div> <!-- app desc -->   
      </div> <!-- app opt --> 

      <div class="app__opt large-4 medium-12 small-12 columns">
        <div class="app__opt__value">
          <p>Starting at</p>
          <h3>$198</h3>
        </div> <!-- app value -->
        <div class="app__opt__img">
          <img src="img/ship-01.jpg" alt="Cruise picture">
        </div><!-- app img-->
        <div class="app__opt__desc">
          <p>Cruise Line Name - Cruise Ship Name</p>
          <h2>Cruise Sailing Title</h2>
          <div class="app__opt__select">
            <input type="radio">
            <span>Name</span>
            <span>$300</span>
          </div>
        </div> <!-- app desc -->   
      </div> <!-- app opt --> 


    </div> <!-- app options Row--> 
  </div><!-- app-->

    <script src="js/vendor/jquery.min.js"></script>
    <script src="js/vendor/what-input.min.js"></script>
    <script src="js/foundation.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
